<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculator</h1>

    <div class="container">
        <div class="display"></div>
        <div class="buttons">
            <div class="numberButtons">
                <div class="Butt1" id="numberButton">1</div>
                <div class="Butt2" id="numberButton">2</div>
                <div class="Butt3" id="numberButton">3</div>
                <div class="Butt4" id="numberButton">4</div>
                <div class="Butt5" id="numberButton">5</div>
                <div class="Butt6" id="numberButton">6</div>
                <div class="Butt7" id="numberButton">7</div>
                <div class="Butt8" id="numberButton">8</div>
                <div class="Butt9" id="numberButton">9</div>
                <div></div>
                <div class="Butt0" id="numberButton">0</div>
            </div>
            <div class="operatorButtons">
                <div class="addButt">+</div>
                <div class="substactButt">-</div>
                <div class="multiplyButt">*</div>
                <div class="divideButt">/</div>
                <div class="powerButt">**</div>
                <div class="equalsButt">=</div>
                <div class="cButt">C/AC</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
