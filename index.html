<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculator</h1>

    <div class="container">
        <div class="display"></div>
        <div class="buttons">
            <div class="numberButtons">
                
            </div>
            <div class="operatorButtons">
                <div class="cButt">C/AC</div>
                <div class="addButt">+</div>
                <div class="subtractButt">-</div>
                <div class="multiplyButt">*</div>
                <div class="divideButt">/</div>
                <div class="powerButt">**</div>
                <div class="equalsButt">=</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
